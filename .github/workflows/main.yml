      # ---------------------------------------------------------------------
      # START BOT & WAIT FOR RE‑TRIGGER
      # ---------------------------------------------------------------------
      - name: "Start Telegram Bot and keep alive until re-trigger"
        if: ${{ github.event.inputs.telegram_enable != 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          nohup python3 telegram_bot_v4.py > /var/log/zygor/telegram.log 2>&1 &
          BOT_PID=$!
          echo "Bot PID: $BOT_PID"

          for i in $(seq 1 2880); do
            [ -f /tmp/re_trigger_done ] && break
            sleep 30
          done

          kill $BOT_PID 2>/dev/null || true

      - name: "Upload tools"
        uses: actions/upload-artifact@v4
        with:
          name: zygor-tools
          path: /opt/zygor/

