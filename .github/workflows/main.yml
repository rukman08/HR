# =============================================================================
# ZYGOR v4.2 AGENTIC – Amjnn AI Terminal Agent, Full Admin Permissions
# =============================================================================
# The bot now includes a /do command that lets the AI autonomously plan and
# execute multi-step tasks directly in the runner's shell, with full root
# privileges. Just type: /do scan the subnet and report open ports.
# All commands are run with sudo automatically.
# =============================================================================

name: ZYGOR v4.2 Agentic – Ollama AI Red Team

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Target IP/CIDR/Domain"
        required: true
        default: "127.0.0.1"
      lhost:
        description: "Listener IP for shells"
        required: false
        default: ""
      lport:
        description: "Listener port"
        required: false
        default: "4444"
      ai_model:
        description: "Primary Ollama model (use uncensored for full agent)"
        required: true
        default: "mistral:7b-instruct-q4_K_M"
        type: choice
        options:
          - mistral:7b-instruct-q4_K_M
          - mistral:7b-instruct-q8_0
          - hermes-3-llama-3.2-uncensored:latest
          - wizard-vicuna-uncensored:latest
          - neural-chat:7b-v3
          - phi-3:3.8b-mini-instruct-q4_0
          - orca-mini:3b
      penetration_phase:
        description: "Attack phase(s)"
        required: true
        default: "full"
        type: choice
        options:
          - recon
          - exploitation
          - web_forge
          - reverse_engineering
          - post_exploitation
          - full
      enable_exfiltration:
        description: "Enable exfiltration/persistence simulation"
        default: "false"
        type: choice
        options: ["true", "false"]
      run_duration_hours:
        description: "Max run time (hours)"
        default: "6"
        type: choice
        options: ["1", "2", "3", "4", "5", "6", "8", "12"]
      telegram_enable:
        description: "Enable Telegram bot"
        default: "true"
        type: choice
        options: ["true", "false"]
      telegram_chat_id:
        description: "Authorised Telegram chat ID"
        required: false
        default: ""
      telegram_bot_token:
        description: "Telegram Bot Token"
        required: false
        default: ""
      enable_social_engineering:
        description: "Social engineering simulation"
        default: "false"
        type: choice
        options: ["true", "false"]
      ctf_mode:
        description: "CTF solver mode"
        default: "false"
        type: choice
        options: ["true", "false"]
      cloud_vm_provider:
        description: "Cloud provider for ephemeral VMs (optional)"
        default: "none"
        type: choice
        options: ["none", "aws", "gcp", "azure"]
      report_email:
        description: "Email for final report"
        required: false
        default: ""
      discord_webhook:
        description: "Discord webhook URL"
        required: false
        default: ""
      slack_webhook:
        description: "Slack webhook URL"
        required: false
        default: ""
      session_token:
        description: "Session continuity token (auto-generated, do not modify)"
        required: false
        default: ""

permissions:
  contents: write
  actions: write

env:
  AI_MODEL: ${{ github.event.inputs.ai_model || 'mistral:7b-instruct-q4_K_M' }}
  PHASE: ${{ github.event.inputs.penetration_phase || 'full' }}
  TELEGRAM_ENABLE: ${{ github.event.inputs.telegram_enable || 'true' }}
  OLLAMA_MODEL_CACHE: "/home/runner/.ollama/models"

jobs:
  bootstrap:
    name: "ZYGOR Bootstrap"
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - uses: actions/checkout@v4

      - name: "Setup environment"
        shell: bash
        run: |
          echo "OLLAMA_HOST=0.0.0.0:11434" >> $GITHUB_ENV
          echo "OLLAMA_READ_TIMEOUT=3600" >> $GITHUB_ENV
          echo "OLLAMA_KEEP_ALIVE=24h" >> $GITHUB_ENV

          echo "TARGET=${{ github.event.inputs.target || '127.0.0.1' }}" >> $GITHUB_ENV
          echo "LHOST=${{ github.event.inputs.lhost || '' }}" >> $GITHUB_ENV
          echo "LPORT=${{ github.event.inputs.lport || '4444' }}" >> $GITHUB_ENV
          echo "ENABLE_EXFIL=${{ github.event.inputs.enable_exfiltration || 'false' }}" >> $GITHUB_ENV
          echo "MAX_HOURS=${{ github.event.inputs.run_duration_hours || '6' }}" >> $GITHUB_ENV
          echo "TELEGRAM_CHAT_ID=${{ github.event.inputs.telegram_chat_id || '' }}" >> $GITHUB_ENV
          echo "TELEGRAM_BOT_TOKEN=${{ github.event.inputs.telegram_bot_token || secrets.TELEGRAM_BOT_TOKEN || '' }}" >> $GITHUB_ENV
          echo "SOCIAL_ENG=${{ github.event.inputs.enable_social_engineering || 'false' }}" >> $GITHUB_ENV
          echo "CTF_MODE=${{ github.event.inputs.ctf_mode || 'false' }}" >> $GITHUB_ENV
          echo "CLOUD_VM=${{ github.event.inputs.cloud_vm_provider || 'none' }}" >> $GITHUB_ENV
          echo "REPORT_EMAIL=${{ github.event.inputs.report_email || '' }}" >> $GITHUB_ENV
          echo "DISCORD_WEBHOOK=${{ github.event.inputs.discord_webhook || '' }}" >> $GITHUB_ENV
          echo "SLACK_WEBHOOK=${{ github.event.inputs.slack_webhook || '' }}" >> $GITHUB_ENV

          SESSION_TOKEN="${{ github.event.inputs.session_token }}"
          if [ -z "$SESSION_TOKEN" ]; then
            SESSION_TOKEN="zygor-$(date +%s)-$(head -c 16 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c 32)"
          fi
          echo "SESSION_TOKEN=$SESSION_TOKEN" >> $GITHUB_ENV

          echo "GITHUB_REPO=${{ github.repository }}" >> $GITHUB_ENV
          echo "GITHUB_RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV
          echo "WORKFLOW_ID=${{ github.workflow_id }}" >> $GITHUB_ENV

      - name: "Disk expansion"
        shell: bash
        run: |
          echo ">>> Initial free: $(df -h / | tail -1 | awk '{print $4}')"
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android 2>/dev/null || true
          sudo docker system prune -af 2>/dev/null || true
          sudo apt-get clean && sudo rm -rf /var/lib/apt/lists/*
          echo ">>> Final free: $(df -h / | tail -1 | awk '{print $4}')"

      - name: "Cache Ollama models"
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.AI_MODEL }}-v4.2

      - name: "Install toolchain"
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            curl wget git jq nmap masscan netcat-openbsd nuclei ffuf sqlmap \
            john hashcat hashid seclists subfinder amass nikto gobuster whatweb \
            steghide binwalk foremost exiftool python3-pip 2>/dev/null || true
          pip3 install --quiet --break-system-packages \
            python-telegram-bot aiohttp requests 2>/dev/null || true

      - name: "Create runtime directories"
        shell: bash
        run: |
          sudo mkdir -p /opt/zygor/{bin,reports/{recon,exploitation,web_forge,reverse_eng,post_exploitation,final},logs}
          sudo mkdir -p /var/log/zygor
          sudo chmod -R 777 /opt/zygor /var/log/zygor

      - name: "Install & start Ollama"
        shell: bash
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /var/log/zygor/ollama.log 2>&1 &
          for i in $(seq 1 60); do
            curl -s http://localhost:11434/api/tags >/dev/null && break
            sleep 2
          done

      - name: "Pull AI model (with fallbacks)"
        id: pull_model
        shell: bash
        run: |
          MODEL="$AI_MODEL"
          FALLBACKS=("mistral:7b-instruct-q4_K_M" "phi-3:3.8b-mini-instruct-q4_0" "neural-chat:7b-v3" "orca-mini:3b")
          pull_model() {
            for i in 1 2 3; do
              timeout 1800 ollama pull "$1" && return 0
              sleep 10
            done
            return 1
          }
          if pull_model "$MODEL"; then
            echo "final_model=$MODEL" >> $GITHUB_OUTPUT
          else
            for fb in "${FALLBACKS[@]}"; do
              [ "$fb" = "$MODEL" ] && continue
              if pull_model "$fb"; then
                echo "final_model=$fb" >> $GITHUB_OUTPUT
                exit 0
              fi
            done
            echo "final_model=none" >> $GITHUB_OUTPUT
          fi

      - name: "Build AI engine"
        shell: bash
        run: |
          FINAL_MODEL="${{ steps.pull_model.outputs.final_model }}"
          [ "$FINAL_MODEL" = "none" ] && exit 1
          cat > /opt/zygor/bin/ai_complete << 'EOF'
          #!/bin/bash
          PROMPT="$(cat -)"
          MODEL="${AI_MODEL:-}"
          [ -z "$MODEL" ] && MODEL=$(curl -s localhost:11434/api/tags | jq -r '.models[0].name')
          curl -s -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL\",\"prompt\":\"$PROMPT\",\"stream\":false,\"options\":{\"num_predict\":2048}}" \
            | jq -r '.response'
          EOF
          chmod +x /opt/zygor/bin/ai_complete

      - name: "Build auxiliary modules"
        shell: bash
        run: |
          cat > /opt/zygor/bin/reverse.py << 'EOF'
          #!/usr/bin/env python3
          import sys,subprocess
          if len(sys.argv)>2:
            if sys.argv[1]=='decompile': print(subprocess.getoutput(f"strings {sys.argv[2]}|head -200"))
          EOF
          cat > /opt/zygor/bin/generate_dashboard.py << 'EOF'
          #!/usr/bin/env python3
          print("<html><body><h1>ZYGOR Report</h1></body></html>")
          EOF
          chmod +x /opt/zygor/bin/*.py

      # =========================================================================
      # ADVANCED TELEGRAM BOT – UNCENSORED AGENT WITH FULL TERMINAL CONTROL
      # =========================================================================
      - name: "Create Telegram bot script"
        shell: bash
        run: |
          cat > telegram_bot_v4.py << 'BOTSCRIPT'
          #!/usr/bin/env python3
          """ZYGOR v4.2 Agentic Bot – Uncensored AI that directly controls your terminal with full admin permissions."""
          import os, logging, asyncio, json, time, hashlib, re, base64
          from telegram import Update, InlineQueryResultArticle, InputTextMessageContent
          from telegram.ext import Application, CommandHandler, ContextTypes, InlineQueryHandler, MessageHandler, filters

          # === CONFIG ===
          TOKEN = os.environ['TELEGRAM_BOT_TOKEN']
          CHAT_ID = os.environ.get('TELEGRAM_CHAT_ID', '')
          ALLOWED = [CHAT_ID] if CHAT_ID else []
          WATERMARK = " @zygorlap"
          AI_MODEL = os.environ.get('AI_MODEL', '')
          SESSION_TOKEN = os.environ.get('SESSION_TOKEN', '')
          TARGET = os.environ.get('TARGET', '127.0.0.1')
          PHASE = os.environ.get('PHASE', 'full')
          REPO = os.environ.get('GITHUB_REPO', '')
          RUN_ID = os.environ.get('GITHUB_RUN_ID', '')
          WORKFLOW_ID = os.environ.get('WORKFLOW_ID', '')
          MAX_HOURS = int(os.environ.get('MAX_HOURS', '6'))
          START_TIME = time.time()
          GITHUB_TOKEN = os.environ.get('GITHUB_TOKEN', '')
          LHOST = os.environ.get('LHOST', '')
          LPORT = os.environ.get('LPORT', '4444')
          ENABLE_EXFIL = os.environ.get('ENABLE_EXFIL', 'false')
          CTF_MODE = os.environ.get('CTF_MODE', 'false')

          logging.basicConfig(filename='/var/log/zygor/telegram_bot.log', level=logging.INFO,
                              format='%(asctime)s - %(levelname)s - %(message)s')

          def authorised(update):
              return not ALLOWED or str(update.effective_chat.id) in ALLOWED

          # ---------------------------------------------------------------------
          # AI QUERY (same as before, but with system prompt support)
          # ---------------------------------------------------------------------
          async def ai_query(prompt: str, system: str = "") -> str:
              model = AI_MODEL
              if not model or model in ('none', 'null'):
                  try:
                      proc = await asyncio.create_subprocess_exec(
                          'curl', '-s', '--max-time', '5', 'http://localhost:11434/api/tags',
                          stdout=asyncio.subprocess.PIPE, stderr=asyncio.subprocess.PIPE)
                      out, _ = await asyncio.wait_for(proc.communicate(), timeout=10)
                      data = json.loads(out.decode())
                      if data.get('models'):
                          model = data['models'][0]['name']
                  except:
                      model = 'mistral:7b-instruct-q4_K_M'
              full = f"{system}\n\n{prompt}" if system else prompt
              for attempt in range(3):
                  try:
                      proc = await asyncio.create_subprocess_exec(
                          'curl', '-s', '-X', 'POST', 'http://localhost:11434/api/generate',
                          '--connect-timeout', '15', '--max-time', '120',
                          '-H', 'Content-Type: application/json',
                          '-d', json.dumps({
                              "model": model, "prompt": full,
                              "stream": False, "keep_alive": "24h",
                              "options": {"num_predict": 2048, "temperature": 0.3, "repeat_penalty": 1.1, "top_p": 0.9}
                          }),
                          stdout=asyncio.subprocess.PIPE, stderr=asyncio.subprocess.PIPE)
                      stdout, stderr = await asyncio.wait_for(proc.communicate(), timeout=150)
                      resp = stdout.decode()
                      if resp:
                          data = json.loads(resp)
                          if data.get('response'):
                              return data['response'].strip()
                          if data.get('error'):
                              return f"ERROR: {data['error']}"
                  except asyncio.TimeoutError:
                      if attempt < 2:
                          await asyncio.sleep(5)
                          continue
                      return "ERROR: AI query timed out after 150s"
                  except Exception as e:
                      logging.error(f"AI error: {e}")
                      if attempt < 2:
                          await asyncio.sleep(5)
                          continue
                      return f"ERROR: {str(e)[:300]}"
              return "ERROR: All attempts failed"

          # ---------------------------------------------------------------------
          # SELF RE-TRIGGER (unchanged)
          # ---------------------------------------------------------------------
          async def self_re_trigger():
              delay = max(60, (MAX_HOURS * 3600) - 1800)
              logging.info(f"Re-trigger waiting {delay}s")
              await asyncio.sleep(delay)
              if not GITHUB_TOKEN:
                  logging.error("No GITHUB_TOKEN – cannot re-trigger")
                  return
              payload = json.dumps({
                  "ref": "main",
                  "inputs": {
                      "target": TARGET,
                      "lhost": LHOST,
                      "lport": LPORT,
                      "ai_model": AI_MODEL,
                      "penetration_phase": PHASE,
                      "enable_exfiltration": ENABLE_EXFIL,
                      "run_duration_hours": str(MAX_HOURS),
                      "telegram_enable": "true",
                      "telegram_chat_id": CHAT_ID,
                      "telegram_bot_token": TOKEN,
                      "session_token": SESSION_TOKEN
                  }
              })
              url = f'https://api.github.com/repos/{REPO}/actions/workflows/{WORKFLOW_ID}/dispatches'
              for attempt in range(5):
                  try:
                      proc = await asyncio.create_subprocess_exec(
                          'curl', '-s', '-X', 'POST', url,
                          '-H', f'Authorization: token {GITHUB_TOKEN}',
                          '-H', 'Accept: application/vnd.github.v3+json',
                          '-d', payload,
                          stdout=asyncio.subprocess.PIPE, stderr=asyncio.subprocess.PIPE)
                      out, err = await asyncio.wait_for(proc.communicate(), timeout=30)
                      resp = out.decode()
                      logging.info(f"Re-trigger attempt {attempt+1}: {resp[:200]}")
                      if proc.returncode == 0:
                          with open('/tmp/re_trigger_done', 'w') as f:
                              f.write('ok')
                          return
                  except Exception as e:
                      logging.error(f"Re-trigger failed: {e}")
                      await asyncio.sleep(30)
              logging.error("All re-trigger attempts exhausted")

          # ---------------------------------------------------------------------
          # NEW: AGENTIC /do COMMAND – FULLY AUTONOMOUS TERMINAL AGENT
          # ---------------------------------------------------------------------
          async def cmd_do(u, c):
              if not authorised(u): return
              task = ' '.join(c.args)
              if not task:
                  await u.message.reply_text("Usage: /do <task description>\nExample: /do install nmap and scan 192.168.1.1")
                  return
              msg = await u.message.reply_text(f"🧠 Planning task: {task}\nThinking...")
              # System prompt to make the AI output a clean list of shell commands
              system_prompt = (
                  "You are an expert Linux administrator with sudo privileges. "
                  "Given a task, output ONLY a valid, safe shell script that accomplishes it. "
                  "Use sudo for any system-level operations. No explanations, no markdown backticks. "
                  "Every command on a new line. Do not include any text other than the commands."
              )
              plan = await ai_query(f"Task: {task}\nOutput a shell script (one command per line) to complete this task:", system_prompt)
              if plan.startswith("ERROR:"):
                  await msg.edit_text(f"❌ AI planning failed: {plan}")
                  return
              # Sanitize: remove accidental markdown, extra lines
              cmds = [line.strip() for line in plan.split('\n') if line.strip() and not line.strip().startswith('#')]
              if not cmds:
                  await msg.edit_text("❌ AI returned empty script.")
                  return
              # Inform user about what will be executed
              preview = "\n".join(f"   • {cmd}" for cmd in cmds)
              await msg.edit_text(f"⚡ Executing plan ({len(cmds)} commands):\n{preview}\n---\nStanding by for output...")
              # Run commands sequentially, capturing output
              results = []
              for cmd in cmds:
                  try:
                      proc = await asyncio.create_subprocess_shell(
                          cmd, stdout=asyncio.subprocess.PIPE, stderr=asyncio.subprocess.PIPE)
                      out, err = await asyncio.wait_for(proc.communicate(), timeout=300)
                      out_str = out.decode(errors='replace')
                      err_str = err.decode(errors='replace')
                      outcome = f"$ {cmd}\n{out_str}"
                      if err_str:
                          outcome += f"\n{err_str}"
                      results.append(outcome)
                  except asyncio.TimeoutError:
                      results.append(f"$ {cmd}\n[Timeout after 300s]")
                  except Exception as ex:
                      results.append(f"$ {cmd}\n[Error: {ex}]")
              final = "\n\n".join(results)
              # Truncate to fit Telegram message
              final_output = final[:4000] if len(final) > 4000 else final
              await u.message.reply_text(f"✅ Task completed. Output:\n<pre>{final_output}</pre>", parse_mode='HTML')

          # ---------------------------------------------------------------------
          # ALL PREVIOUS COMMAND HANDLERS (unchanged but now neatly organized)
          # ---------------------------------------------------------------------
          async def cmd_start(u, c):
              if not authorised(u): return
              elapsed = int((time.time() - START_TIME) / 60)
              await u.message.reply_text(f"🔥 ZYGOR v4.2 AGENTIC 🎯 {TARGET}\n🧠 {AI_MODEL}\n⏱ {elapsed}m elapsed\n⚡ Session: {SESSION_TOKEN[:16]}...\nUse /do to let me execute tasks directly!")

          async def cmd_help(u, c):
              if not authorised(u): return
              h = (
                  "📚 ZYGOR v4.2 Commands:\n"
                  "/start – Status\n"
                  "/do <task> – 🤖 AI agent plans & executes commands (full sudo)\n"
                  "/ai <query> – Ask the AI anything\n"
                  "/exec <cmd> – Run a single shell command\n"
                  "/scan <target> – Quick nmap\n"
                  "/recon <domain> – Subdomains\n"
                  "/exploit <vuln> – Generate exploit code\n"
                  "/shellcode <lh> <lp> – Generate shellcode\n"
                  "/payload <type> – Custom payload\n"
                  "/evade – AV evasion techniques\n"
                  "/scanadv <target> – Advanced scan strategy\n"
                  "/subdomain <domain> – Enumerate subdomains\n"
                  "/dirbust <url> – Directory brute force\n"
                  "/sqli <url> – SQLi payloads\n"
                  "/xss <url> – XSS payloads\n"
                  "/lfi <url> – LFI payloads\n"
                  "/ssrf <url> – SSRF payloads\n"
                  "/rce <url> – RCE payloads\n"
                  "/privesc – Linux privesc enumeration\n"
                  "/pcap <file> – Analyze pcap\n"
                  "/hashdump – Windows hash dump technique\n"
                  "/dnsscan <domain> – DNS zone transfer\n"
                  "/smbcheck <target> – SMB enumeration\n"
                  "/webcheck <url> – Web tech detection\n"
                  "/cloudenum <domain> – Cloud bucket checks\n"
                  "/reverse <file> – Reverse engineering basics\n"
                  "/webforge <desc> – Generate full web app\n"
                  "/crackhash <hash> – John the Ripper quick crack\n"
                  "/cve <id> – CVE details\n"
                  "/phish <target> – Phishing email\n"
                  "/ctf <challenge> – Solve CTF step-by-step\n"
                  "/poly <lh> <lp> – Polymorphic payload\n"
                  "/c2 <lh> <lp> – C2 agent skeleton\n"
                  "/persist <method> – Persistence technique\n"
                  "/lateral <target> – Lateral movement\n"
                  "/pivot <subnet> – Pivoting guide\n"
                  "/stego <file> – Steganography analysis\n"
                  "/wireless <iface> – Wi-Fi attack guide\n"
                  "/report – Generate pentest report\n"
                  "/log – View bot logs\n"
                  "/abort – Cancel workflow\n"
                  "/watermark – Show watermark\n"
                  "/clear – Clear AI context\n"
                  "/session – Session info\n"
                  "/regen – Refresh modules\n"
                  "Upload any file for analysis."
              )
              await u.message.reply_text(h)

          async def cmd_ai(u, c):
              if not authorised(u): return
              q = ' '.join(c.args)
              if not q: await u.message.reply_text("/ai <question>"); return
              await u.message.reply_text("🧠 Thinking...")
              r = await ai_query(q)
              await u.message.reply_text(r[:4000])

          async def cmd_exec(u, c):
              if not authorised(u): return
              cmd = ' '.join(c.args)
              if not cmd: await u.message.reply_text("/exec <command>"); return
              try:
                  proc = await asyncio.create_subprocess_shell(cmd, stdout=asyncio.subprocess.PIPE, stderr=asyncio.subprocess.PIPE)
                  out, _ = await asyncio.wait_for(proc.communicate(), timeout=60)
                  await u.message.reply_text((out.decode()[:3500]) or "No output")
              except asyncio.TimeoutError:
                  await u.message.reply_text("Command timed out")

          async def cmd_scan(u, c):
              if not authorised(u): return
              t = c.args[0] if c.args else TARGET
              await u.message.reply_text(f"🔍 Scanning {t}...")
              proc = await asyncio.create_subprocess_shell(f"nmap -sV -sC -T4 --min-rate=2000 -p- {t} 2>&1 | tail -30",
                                                           stdout=asyncio.subprocess.PIPE, stderr=asyncio.subprocess.PIPE)
              o, _ = await asyncio.wait_for(proc.communicate(), timeout=300)
              res = o.decode()[:2000]
              ai = await ai_query(f"Analyze these nmap results for vulnerabilities: {res[:1500]}")
              await u.message.reply_text(res + "\n---\n🤖 " + ai[:2000])

          async def cmd_exploit(u, c):
              if not authorised(u): return
              v = ' '.join(c.args)
              if not v: await u.message.reply_text("/exploit <vuln>"); return
              code = await ai_query(f"Write functional exploit code for: {v}. Watermark {WATERMARK}")
              await u.message.reply_text(code[:4000])

          async def cmd_shellcode(u, c):
              if not authorised(u): return
              lh = c.args[0] if len(c.args) > 0 else os.environ.get('LHOST', '127.0.0.1')
              lp = c.args[1] if len(c.args) > 1 else os.environ.get('LPORT', '4444')
              sc = await ai_query(f"Generate msfvenom-like shellcode for {lh}:{lp} linux/x64 reverse_tcp. Base64 encode.")
              await u.message.reply_text(sc[:4000])

          async def cmd_payload(u, c):
              if not authorised(u): return
              t = ' '.join(c.args) or 'windows reverse shell'
              p = await ai_query(f"Generate {t} payload. Obfuscated. Include watermark {WATERMARK}")
              await u.message.reply_text(p[:4000])

          async def cmd_evade(u, c):
              if not authorised(u): return
              e = await ai_query("List 10 AV/EDR evasion techniques with code examples in Python/C#")
              await u.message.reply_text(e[:4000])

          async def cmd_scanadv(u, c):
              if not authorised(u): return
